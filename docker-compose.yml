services:
  neo4j:
    image: neo4j:5.15-community
    container_name: rustymirosquid-neo4j
    environment:
      - NEO4J_AUTH=neo4j/rustymirosquid
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: rustymirosquid-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  rustymirosquid:
    build: .
    container_name: rustymirosquid
    environment:
      - LLM_API_KEY=ollama
      - LLM_BASE_URL=http://ollama:11434/v1
      - LLM_MODEL_NAME=qwen2.5:32b
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=rustymirosquid
      - EMBEDDING_MODEL=nomic-embed-text
      - EMBEDDING_BASE_URL=http://ollama:11434
      - OPENAI_API_KEY=ollama
      - OPENAI_API_BASE_URL=http://ollama:11434/v1
    ports:
      - "3000:3000"
      - "5001:5001"
    depends_on:
      - neo4j
      - ollama
    restart: unless-stopped
    volumes:
      - ./backend/uploads:/app/backend/uploads

volumes:
  neo4j_data:
  ollama_data:
